services:
  - type: web
    name: neck-exercises-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/data.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: neck-exercises-frontend
    runtime: static
    staticPublishPath: .
    buildCommand: ""
