services:
  - type: web
    name: neck-exercises-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: data.db
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: neck-exercises-frontend
    runtime: static
    staticPublishPath: .
    buildCommand: ""
